# ChatControl Language File (English)
# Use MiniMessage format: https://docs.advntr.dev/minimessage/format.html

commands:
  usage: "<prefix><red>Usage: /chatcontrol <clear|on|off|status|reload>"
  unknown: "<prefix><red>Unknown subcommand! Use /chatcontrol for help."
  clear:
    success: "<prefix><green>Chat has been cleared by <yellow><player><green>."
    console: "<prefix><green>Chat has been cleared by <yellow>Console<green>."
    player: "<prefix><green>Cleared <yellow><player><green>'s chat."
    not-found: "<prefix><red>Player not found!"
  toggle:
    enabled: "<prefix><green>Chat has been enabled by <yellow><player><green>."
    disabled: "<prefix><red>Chat has been disabled by <yellow><player><red>."
  status:
    header: "<gray>--- <color:#ff5555>ChatControl Status</color> ---"
    chat: "<gray>Chat: <status>"
    join-messages: "<gray>Join Messages: <status>"
    leave-messages: "<gray>Leave Messages: <status>"
    advancements: "<gray>Advancements: <status>"
    luckperms: "<gray>LuckPerms Hook: <status>"
    bypass-groups: "<gray>Bypass Groups: <yellow><groups>"
    enabled: "<green>Enabled"
    disabled: "<red>Disabled"
    hidden: "<red>Hidden"
    visible: "<green>Visible"
    footer: "<gray>-----------------------"

chat:
  disabled: "<prefix><red>Chat is currently disabled!"
  cooldown: "<prefix><red>Please wait <yellow><seconds>s<red> before sending another message."
  filtered: "<prefix><red>Your message contains forbidden words!"
  allowed-characters: "<prefix><red>Your message contains disallowed characters!"

other:
  short-alias-disabled: "<prefix><red>The /cc alias is disabled. Use /chatcontrol instead."
  reload-success: "<prefix><green>Configuration and messages reloaded successfully!"
  reload-fail: "<prefix><red>Failed to reload configuration! Check console for details."
