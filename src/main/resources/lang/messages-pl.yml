    bypass-groups: "<gray>Grupy z bypassem: <yellow><groups>"
    enabled: "<green>Wlaczony"
    disabled: "<red>Wylaczony"
    hidden: "<red>Ukryte"
    visible: "<green>Widoczne"
    footer: "<gray>-----------------------"

chat:
  disabled: "<prefix><red>Czat jest obecnie wylaczony!"
  cooldown: "<prefix><red>Poczekaj <yellow><seconds>s<red> przed wyslaniem kolejnej wiadomosci."
  filtered: "<prefix><red>Twoja wiadomosc zawiera zabronione slowa!"
  allowed-characters: "<prefix><red>Twoja wiadomosc zawiera niedozwolone znaki!"

other:
  short-alias-disabled: "<prefix><red>Alias /cc jest wylaczony. Uzyj /chatcontrol."
  reload-success: "<prefix><green>Konfiguracja i wiadomosci zostaly przeladowane pomyslnie!"
