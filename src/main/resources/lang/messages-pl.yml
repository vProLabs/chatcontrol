    enabled: "<prefix><green>Czat zostal wlaczony przez <yellow><player><green>."
    disabled: "<prefix><red>Czat zostal wylaczony przez <yellow><player><red>."
  status:
    header: "<gray>--- <color:#ff5555>ChatControl Status</color> ---"
    chat: "<gray>Czat: <status>"
