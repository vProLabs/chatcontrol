# vChatUtils by vProLabs
# Minecraft 1.21.x Chat Management Plugin
# Version: 1.0.2

# ============================================
# GENERAL SETTINGS
# ============================================

# Plugin prefix (supports color codes with &)
prefix: "&8[&cvProLabs&8] "

# Language settings
# Available: en, pl
language: en

# ============================================
# CHAT SETTINGS
# ============================================

# Is chat enabled by default?
chat-enabled: true

# Hide join messages?
hide-join-messages: false

# Hide leave messages?
hide-leave-messages: false

# Hide advancement messages?
hide-advancements: false

# ============================================
# COMMAND ALIASES
# ============================================

# Enable Polish command aliases
polish-aliases: true

# Enable English command aliases
english-aliases: true

# ============================================
# LUCKPERMS INTEGRATION
# ============================================

# Enable LuckPerms integration
luckperms-integration: false
