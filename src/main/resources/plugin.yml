name: ChatControl
version: ${version}
main: xyz.vprolabs.chatcontrol.ChatControl
api-version: "1.21"
author: vProLabs
description: Advanced chat management plugin with multi-language support and LuckPerms integration

softdepend: [LuckPerms, PlaceholderAPI]

commands:
  chatcontrol:
    description: Manage chat settings
    usage: /chatcontrol <clear|on|off|status|reload>
    permission: chatcontrol.admin
    aliases: [cc]

permissions:
  chatcontrol.admin:
    description: Access to all chat management commands
    default: op
  chatcontrol.bypass:
    description: Bypass disabled chat
    default: op
